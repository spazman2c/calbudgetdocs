<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Add a transaction in CalBudget</title>
  <desc id="desc">A transaction form with amount, date, type, category, repeat, and save controls.</desc>
  <rect width="1200" height="720" rx="32" fill="#080A12"/>
  <rect x="96" y="72" width="1008" height="576" rx="30" fill="#11131C" stroke="#303544" stroke-width="2"/>
  <rect x="96" y="72" width="1008" height="88" rx="30" fill="#171923"/>
  <text x="144" y="126" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="850">Add transaction</text>
  <text x="778" y="126" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Selected date: July 12</text>
  <g font-family="Inter, Arial, sans-serif">
    <text x="144" y="216" fill="#A5B4FC" font-size="15" font-weight="900" letter-spacing="4">TITLE</text>
    <rect x="144" y="232" width="402" height="66" rx="18" fill="#0B0D14" stroke="#3B4255"/>
    <text x="172" y="273" fill="#E5E7EB" font-size="22" font-weight="700">Car insurance</text>
    <text x="604" y="216" fill="#A5B4FC" font-size="15" font-weight="900" letter-spacing="4">AMOUNT</text>
    <rect x="604" y="232" width="352" height="66" rx="18" fill="#0B0D14" stroke="#7C3AED" stroke-width="2"/>
    <text x="632" y="273" fill="#E5E7EB" font-size="22" font-weight="700">$133.00</text>
    <text x="144" y="356" fill="#A5B4FC" font-size="15" font-weight="900" letter-spacing="4">TYPE</text>
    <rect x="144" y="374" width="190" height="58" rx="18" fill="#3B1117" stroke="#EF4444"/>
    <text x="192" y="410" fill="#FECACA" font-size="20" font-weight="850">Expense</text>
    <rect x="356" y="374" width="190" height="58" rx="18" fill="#052E25" stroke="#10B981"/>
    <text x="414" y="410" fill="#A7F3D0" font-size="20" font-weight="850">Income</text>
    <text x="604" y="356" fill="#A5B4FC" font-size="15" font-weight="900" letter-spacing="4">CATEGORY</text>
    <rect x="604" y="374" width="352" height="58" rx="18" fill="#0B0D14" stroke="#3B4255"/>
    <circle cx="636" cy="403" r="10" fill="#38BDF8"/>
    <text x="660" y="410" fill="#E5E7EB" font-size="20" font-weight="750">Insurance</text>
    <text x="144" y="490" fill="#A5B4FC" font-size="15" font-weight="900" letter-spacing="4">REPEAT</text>
    <rect x="144" y="508" width="402" height="58" rx="18" fill="#0B0D14" stroke="#3B4255"/>
    <text x="172" y="544" fill="#E5E7EB" font-size="20" font-weight="750">Monthly</text>
    <text x="604" y="490" fill="#A5B4FC" font-size="15" font-weight="900" letter-spacing="4">ACCOUNT</text>
    <rect x="604" y="508" width="352" height="58" rx="18" fill="#0B0D14" stroke="#3B4255"/>
    <text x="632" y="544" fill="#E5E7EB" font-size="20" font-weight="750">Main checking</text>
    <rect x="808" y="590" width="148" height="58" rx="18" fill="#7C3AED"/>
    <text x="856" y="626" fill="#FFFFFF" font-size="20" font-weight="900">Save</text>
  </g>
</svg>
